stages:
  - build
  - deploy

# ---------------------------------------------------------------------------
# Build & push to GitLab Container Registry
# Runs on every push. Tags the image with the commit SHA (and the Git tag when
# a tag is pushed). Also updates the :latest tag on every run.
# ---------------------------------------------------------------------------

build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--insecure-registry=registry.ppouz.lan:443"]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "registry.ppouz.lan:443"
  script:
    - |
      TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      docker build \
        -t "$CI_REGISTRY_IMAGE:$TAG" \
        -t "$CI_REGISTRY_IMAGE:latest" \
        .
      docker push "$CI_REGISTRY_IMAGE:$TAG"
      docker push "$CI_REGISTRY_IMAGE:latest"

# ---------------------------------------------------------------------------
# Deploy via SSH — only on Git tags (e.g. v1.2.3)
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY  — private key with access to the deploy server
#   DEPLOY_HOST      — server hostname or IP
#   DEPLOY_USER      — SSH user on the server
#   DEPLOY_PATH      — absolute path to docker-compose.yml on the server
#
# The docker-compose.yml on the server must reference the registry image:
#
#   services:
#     livebox_dashboard:
#       image: registry.gitlab.com/<your-group>/<your-project>:${IMAGE_TAG:-latest}
#       ports:
#         - "4350:4350"
#       restart: unless-stopped
#       env_file: .env
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
    - echo "DEPLOY_HOST=$DEPLOY_HOST"
    - echo "DEPLOY_USER=$DEPLOY_USER"
    - echo "DEPLOY_PATH=$DEPLOY_PATH"
  script:
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s << EOF
        set -e
        echo "Registry: $CI_REGISTRY"
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        mkdir -p "$DEPLOY_PATH"
        cd "$DEPLOY_PATH"
        IMAGE_TAG="$CI_COMMIT_TAG" docker compose pull
        IMAGE_TAG="$CI_COMMIT_TAG" docker compose up -d --no-build
      EOF